cat > /mnt/user-data/outputs/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ink & Ether — Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#0F0E17;--surface:#1C1B2E;--sidebar:#16152A;--raised:#232240;
  --border:#2D2B4E;--accent:#7C6AF7;--accent2:#A594F9;--gold:#F2C94C;
  --rose:#F27A8B;--teal:#4EC9B0;--green:#6FCF97;--sky:#56CCF2;
  --text:#E8E6FF;--text-mid:#A9A6CC;--text-muted:#6B6990;--danger:#F27A8B;
}
html,body{height:100%;overflow:hidden;background:var(--void)}
body{font-family:'Inter',sans-serif;color:var(--text);display:flex;flex-direction:column}

/* TOPBAR */
.topbar{height:52px;background:var(--sidebar);display:flex;align-items:center;padding:0 20px;gap:14px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;flex-shrink:0}
.topbar-search{flex:1;max-width:400px;position:relative}
.topbar-search input{width:100%;padding:8px 14px 8px 38px;background:var(--raised);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
.topbar-search input:focus{border-color:var(--accent)}
.topbar-search input::placeholder{color:var(--text-muted)}
.topbar-search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none}
.topbar-spacer{flex:1}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:8px;border:none;cursor:pointer;background:var(--raised);color:var(--text-mid);font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.icon-btn:hover{background:var(--border);color:var(--text)}
.new-btn{display:flex;align-items:center;gap:7px;padding:0 16px;height:34px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s,box-shadow .2s;box-shadow:0 4px 16px rgba(124,106,247,.35);white-space:nowrap}
.new-btn:hover{background:var(--accent2);box-shadow:0 6px 24px rgba(124,106,247,.5);transform:translateY(-1px)}
.new-btn .plus{font-size:18px;font-weight:300}

/* LAYOUT */
.workspace{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:290px;background:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border);flex-shrink:0;overflow:hidden}
.sidebar-tabs{display:flex;padding:12px 12px 0;gap:4px;flex-shrink:0}
.sidebar-tab{flex:1;padding:8px;border-radius:8px 8px 0 0;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;text-align:center;transition:color .15s;border-bottom:2px solid transparent}
.sidebar-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.sidebar-tab:hover:not(.active){color:var(--text-mid)}
.sidebar-divider{height:1px;background:var(--border);margin:0 12px;flex-shrink:0}
.note-list{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:5px}
.note-list::-webkit-scrollbar{width:4px}
.note-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* NOTE CARDS */
.note-card{padding:13px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.note-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:width .2s}
.note-card:hover::before,.note-card.active::before{width:4px}
.note-card:hover{background:var(--raised);border-color:rgba(124,106,247,.4);transform:translateX(2px)}
.note-card.active{background:var(--raised);border-color:var(--accent)}
.note-card-title{font-family:'Playfair Display',serif;font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:44px}
.note-card-preview{font-size:11.5px;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.note-card-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted)}
.note-card-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px}
.note-card-actions{position:absolute;top:9px;right:9px;display:flex;gap:3px;opacity:0;transition:opacity .15s}
.note-card:hover .note-card-actions{opacity:1}
.cab{width:22px;height:22px;border-radius:5px;border:none;background:var(--border);color:var(--text-muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.cab:hover{background:var(--danger);color:#fff}
.empty-list{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-muted);padding:24px;font-size:13px;text-align:center}
.empty-list-icon{font-size:36px;opacity:.4}

/* EDITOR */
.editor{flex:1;display:flex;flex-direction:column;background:var(--void);overflow:hidden;min-width:0}
.editor-topbar{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.editor-tag-select{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--raised);color:var(--text);font-size:12px;font-family:'Inter',sans-serif;outline:none;cursor:pointer}
.editor-tag-select option{background:var(--surface)}
.editor-spacer{flex:1}
.editor-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted)}
.save-btn{padding:6px 16px;border-radius:7px;border:none;background:rgba(124,106,247,.15);color:var(--accent2);font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}
.save-btn:hover{background:var(--accent);color:#fff}
.save-btn.saved{color:var(--green);background:rgba(111,207,151,.1)}

.editor-title-wrap{padding:32px 48px 0;flex-shrink:0}
.editor-title{width:100%;background:transparent;border:none;outline:none;font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--text);line-height:1.2;resize:none;overflow:hidden;caret-color:var(--accent)}
.editor-title::placeholder{color:var(--text-muted)}

.editor-rule{height:1px;margin:18px 48px 0;background:linear-gradient(90deg,var(--accent) 0%,var(--border) 30%,transparent 100%);flex-shrink:0}

.toolbar{display:flex;align-items:center;gap:2px;padding:7px 48px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface)}
.tbtn{width:30px;height:27px;border-radius:5px;border:none;background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;transition:background .1s,color .1s}
.tbtn:hover{background:var(--raised);color:var(--text)}
.tsep{width:1px;height:16px;background:var(--border);margin:0 3px;flex-shrink:0}

.editor-body{flex:1;overflow-y:auto;padding:0 48px 80px}
.editor-body::-webkit-scrollbar{width:6px}
.editor-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.editor-textarea{width:100%;min-height:400px;background:transparent;border:none;outline:none;resize:none;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.8;caret-color:var(--accent);padding-top:20px}
.editor-textarea::placeholder{color:var(--text-muted)}

/* EMPTY EDITOR */
.editor-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text-muted);text-align:center;padding:40px}
.ee-icon{font-size:60px;opacity:.07;font-family:'Playfair Display',serif}
.ee-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:var(--text-muted);opacity:.45}
.ee-sub{font-size:13px;opacity:.6}
.ee-cta{margin-top:6px;padding:10px 24px;border-radius:8px;background:rgba(124,106,247,.12);color:var(--accent2);border:1px solid rgba(124,106,247,.25);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.ee-cta:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* STATUS */
.statusbar{height:24px;background:#0B0A14;display:flex;align-items:center;padding:0 16px;gap:16px;border-top:1px solid var(--border);flex-shrink:0}
.si2{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.ss{flex:1}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,9,20,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:460px;box-shadow:0 32px 80px rgba(0,0,0,.6);transform:translateY(16px) scale(.97);transition:transform .2s;overflow:hidden}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-ttl{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.mclose{width:28px;height:28px;border-radius:7px;border:none;background:var(--raised);color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.mclose:hover{background:var(--danger);color:#fff}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.flabel{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px}
.finput{width:100%;padding:10px 14px;background:var(--raised);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s;font-family:'Inter',sans-serif}
.finput:focus{border-color:var(--accent)}
.finput::placeholder{color:var(--text-muted)}
.color-grid{display:flex;gap:10px;flex-wrap:wrap}
.cswatch{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.cswatch:hover{transform:scale(1.12)}
.cswatch.selected{border-color:#fff;transform:scale(1.15)}
.modal-ftr{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s}
.btn-ghost{background:var(--raised);color:var(--text-mid);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text-mid)}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(124,106,247,.3)}
.btn-accent:hover{background:var(--accent2);box-shadow:0 6px 24px rgba(124,106,247,.5)}

/* TOAST */
.toast-wrap{position:fixed;bottom:36px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;border-left:3px solid var(--accent);animation:tin .25s ease}
.toast.out{animation:tout .2s ease forwards}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
@keyframes tout{from{opacity:1}to{transform:translateX(110%);opacity:0}}

/* TAG COLORS */
.tag-violet{color:#A594F9;background:rgba(165,148,249,.12)}
.tag-rose{color:#F27A8B;background:rgba(242,122,139,.12)}
.tag-teal{color:#4EC9B0;background:rgba(78,201,176,.12)}
.tag-gold{color:#F2C94C;background:rgba(242,201,76,.12)}
.tag-green{color:#6FCF97;background:rgba(111,207,151,.12)}
.tag-sky{color:#56CCF2;background:rgba(86,204,242,.12)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Ink &amp; Ether</div>
  <div class="topbar-search">
    <span class="si">🔍</span>
    <input type="text" id="search-input" placeholder="Search your notes…" oninput="searchNotes(this.value)">
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="exportNotes()" title="Export all notes">💾</button>
    <button class="icon-btn" onclick="importNotes()" title="Import notes">📂</button>
    <button class="new-btn" onclick="openModal()"><span class="plus">+</span> New Note</button>
  </div>
</div>

<div class="workspace">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" onclick="setTab('all',this)">All</div>
      <div class="sidebar-tab" onclick="setTab('recent',this)">Recent</div>
      <div class="sidebar-tab" onclick="setTab('pinned',this)">Pinned</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="note-list" id="note-list"></div>
  </div>

  <!-- EDITOR -->
  <div class="editor">

    <div class="editor-empty" id="editor-empty">
      <div class="ee-icon">✒</div>
      <div class="ee-title">Open a note</div>
      <div class="ee-sub">Select from the sidebar or create something new</div>
      <button class="ee-cta" onclick="openModal()">+ Create your first note</button>
    </div>

    <div id="editor-active" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="editor-topbar">
        <select class="editor-tag-select" id="editor-tag" onchange="onTagChange()">
          <option value="violet">🟣 Ideas</option>
          <option value="rose">🔴 Important</option>
          <option value="teal">🟦 Work</option>
          <option value="gold">🟡 Personal</option>
          <option value="green">🟢 Projects</option>
          <option value="sky">🔵 Research</option>
        </select>
        <div class="editor-spacer"></div>
        <div class="editor-meta" id="editor-meta">— words · — lines</div>
        <button class="save-btn" id="save-btn" onclick="saveNote()">Save</button>
      </div>

      <div class="editor-title-wrap">
        <textarea class="editor-title" id="editor-title" rows="1"
          placeholder="Untitled note…"
          oninput="autoResizeTitle(this);markDirty()"
          onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('editor-textarea').focus()}"></textarea>
      </div>

      <div class="editor-rule" id="editor-rule"></div>

      <div class="toolbar">
        <button class="tbtn" onclick="insertWrap('**','**')" title="Bold"><b>B</b></button>
        <button class="tbtn" onclick="insertWrap('*','*')" title="Italic"><i>I</i></button>
        <button class="tbtn" onclick="insertWrap('~~','~~')" title="Strikethrough" style="text-decoration:line-through">S</button>
        <button class="tbtn" onclick="insertWrap('`','`')" title="Inline code" style="font-size:11px">`c`</button>
        <div class="tsep"></div>
        <button class="tbtn" onclick="insertLinePrefix('# ')" title="Heading 1" style="font-size:11px">H1</button>
        <button class="tbtn" onclick="insertLinePrefix('## ')" title="Heading 2" style="font-size:11px">H2</button>
        <button class="tbtn" onclick="insertLinePrefix('### ')" title="Heading 3" style="font-size:11px">H3</button>
        <div class="tsep"></div>
        <button class="tbtn" onclick="insertLinePrefix('• ')" title="Bullet list">•</button>
        <button class="tbtn" onclick="insertLinePrefix('[ ] ')" title="Task">☐</button>
        <button class="tbtn" onclick="insertLinePrefix('> ')" title="Blockquote">❝</button>
        <div class="tsep"></div>
        <button class="tbtn" onclick="insertHR()" title="Horizontal rule" style="font-size:11px">—</button>
        <button class="tbtn" onclick="insertDate()" title="Insert date" style="font-size:11px">📅</button>
        <div class="tsep"></div>
        <button class="tbtn" onclick="clearTA()" title="Clear note" style="font-size:11px;color:var(--rose)">✕</button>
      </div>

      <div class="editor-body">
        <textarea class="editor-textarea" id="editor-textarea"
          placeholder="Start writing… your thoughts deserve a home."
          oninput="markDirty();updateMeta()"></textarea>
      </div>
    </div>

  </div>
</div>

<div class="statusbar">
  <div class="si2"><div class="sdot"></div>Ink &amp; Ether</div>
  <div class="si2" id="status-count">0 notes</div>
  <div class="ss"></div>
  <div class="si2" id="status-time">—</div>
  <div class="si2">Auto-save ✓</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOut(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-ttl">New Note</div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="flabel">Title</div>
        <input class="finput" id="modal-title" placeholder="Name your note…" onkeydown="if(event.key==='Enter')createNote()">
      </div>
      <div>
        <div class="flabel">Category color</div>
        <div class="color-grid">
          <div class="cswatch selected" data-tag="violet" style="background:linear-gradient(135deg,#A594F9,#7C6AF7)" onclick="pickColor(this)"></div>
          <div class="cswatch" data-tag="rose"   style="background:linear-gradient(135deg,#F27A8B,#C2536A)" onclick="pickColor(this)"></div>
          <div class="cswatch" data-tag="teal"   style="background:linear-gradient(135deg,#4EC9B0,#2D9E8A)" onclick="pickColor(this)"></div>
          <div class="cswatch" data-tag="gold"   style="background:linear-gradient(135deg,#F2C94C,#C9A22A)" onclick="pickColor(this)"></div>
          <div class="cswatch" data-tag="green"  style="background:linear-gradient(135deg,#6FCF97,#4CA86F)" onclick="pickColor(this)"></div>
          <div class="cswatch" data-tag="sky"    style="background:linear-gradient(135deg,#56CCF2,#2DA8CC)" onclick="pickColor(this)"></div>
        </div>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" onclick="createNote()">Create Note</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>
<input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const TAGS={violet:'Ideas',rose:'Important',teal:'Work',gold:'Personal',green:'Projects',sky:'Research'};
const BORDERS={violet:'#A594F9',rose:'#F27A8B',teal:'#4EC9B0',gold:'#F2C94C',green:'#6FCF97',sky:'#56CCF2'};

let notes=JSON.parse(localStorage.getItem('inkether2')||'[]');
let activeId=null,dirty=false,tab='all',selColor='violet',aTimer=null;

(function init(){
  if(!notes.length)seed();
  injectTagStyles();
  render();
  setupKeys();
  updateClock();
  setInterval(updateClock,30000);
})();

function seed(){
  const t=Date.now();
  notes=[
    {id:uid(),title:'Welcome to Ink & Ether ✨',body:'This is your personal writing space.\n\nThings you can do:\n• Create notes with the + button or Ctrl+N\n• Color-code by category\n• Search across all notes instantly\n• Ctrl+S to save, or notes auto-save as you type\n• Pin important notes to keep them at the top\n• Export all notes as JSON for backup\n\nYour notes live in your browser — private and offline-ready.',tag:'violet',pinned:true,created:t,modified:t},
    {id:uid(),title:'Project ideas',body:'• Redesign the onboarding flow\n• Build a dark-mode toggle\n• Write unit tests for auth module\n• Review accessibility audit\n• Set up CI/CD pipeline',tag:'green',pinned:false,created:t-86400000,modified:t-3600000},
    {id:uid(),title:'Reading notes',body:'> "Design is not just what it looks like and feels like. Design is how it works."\n> — Steve Jobs\n\nTopics to explore:\n• Typography in UI design\n• Color theory for dark interfaces\n• Reducing cognitive load in complex apps\n• The psychology of whitespace',tag:'sky',pinned:false,created:t-172800000,modified:t-86400000},
  ];
  save();
}

function injectTagStyles(){
  const s=document.createElement('style');
  s.id='ts';
  s.textContent=Object.entries(BORDERS).map(([k,v])=>
    `.note-card[data-tag="${k}"]::before{background:${v}}`
  ).join('');
  document.head.appendChild(s);
}

function render(filter=''){
  const list=document.getElementById('note-list');
  let arr=[...notes];
  if(filter)arr=arr.filter(n=>(n.title+n.body).toLowerCase().includes(filter.toLowerCase()));
  if(tab==='recent')arr=[...arr].sort((a,b)=>b.modified-a.modified).slice(0,8);
  if(tab==='pinned')arr=arr.filter(n=>n.pinned);
  arr.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.modified-a.modified));

  document.getElementById('status-count').textContent=`${notes.length} note${notes.length!==1?'s':''}`;

  if(!arr.length){
    list.innerHTML=`<div class="empty-list"><div class="empty-list-icon">📭</div>${filter?'No matches found':'No notes here yet'}</div>`;
    return;
  }
  list.innerHTML=arr.map(n=>`
    <div class="note-card${n.id===activeId?' active':''}" data-tag="${n.tag}" onclick="openNote('${n.id}')">
      <div class="note-card-actions">
        <button class="cab" onclick="togglePin('${n.id}',event)" title="${n.pinned?'Unpin':'Pin'}">${n.pinned?'📌':'📍'}</button>
        <button class="cab" onclick="delNote('${n.id}',event)" title="Delete">🗑</button>
      </div>
      <div class="note-card-title">${esc(n.title||'Untitled')}</div>
      <div class="note-card-preview">${esc((n.body||'').slice(0,120))}</div>
      <div class="note-card-meta">
        <span class="note-card-date">${relTime(n.modified)}</span>
        <span class="note-card-tag tag-${n.tag}">${TAGS[n.tag]||n.tag}</span>
      </div>
    </div>`).join('');
}

function openNote(id){
  if(dirty)autoSave();
  activeId=id;
  const n=notes.find(x=>x.id===id);
  if(!n)return;
  document.getElementById('editor-empty').style.display='none';
  const ae=document.getElementById('editor-active');
  ae.style.display='flex';ae.style.flex='1';ae.style.flexDirection='column';ae.style.overflow='hidden';
  document.getElementById('editor-title').value=n.title||'';
  document.getElementById('editor-textarea').value=n.body||'';
  document.getElementById('editor-tag').value=n.tag||'violet';
  autoResizeTitle(document.getElementById('editor-title'));
  updateMeta();setSaved();updateRule(n.tag);render();
}

function updateRule(tag){
  const r=document.getElementById('editor-rule');
  r.style.background=`linear-gradient(90deg,${BORDERS[tag]||BORDERS.violet} 0%,var(--border) 30%,transparent 100%)`;
}

function markDirty(){
  dirty=true;
  const b=document.getElementById('save-btn');
  b.textContent='Save •';b.classList.remove('saved');
  clearTimeout(aTimer);aTimer=setTimeout(()=>{if(dirty)autoSave();},1400);
}
function autoSave(){saveNote(true)}
function saveNote(silent=false){
  if(!activeId)return;
  const n=notes.find(x=>x.id===activeId);if(!n)return;
  n.title=document.getElementById('editor-title').value.trim()||'Untitled';
  n.body=document.getElementById('editor-textarea').value;
  n.tag=document.getElementById('editor-tag').value;
  n.modified=Date.now();
  save();dirty=false;setSaved();render();
  if(!silent)toast('✅ Saved');
}
function setSaved(){const b=document.getElementById('save-btn');b.textContent='Saved';b.classList.add('saved')}
function onTagChange(){markDirty();updateRule(document.getElementById('editor-tag').value)}

function createNote(){
  const title=document.getElementById('modal-title').value.trim()||'Untitled';
  const n={id:uid(),title,body:'',tag:selColor,pinned:false,created:Date.now(),modified:Date.now()};
  notes.unshift(n);save();closeModal();render();openNote(n.id);
  toast('📝 Note created');
  setTimeout(()=>document.getElementById('editor-textarea').focus(),80);
}
function delNote(id,e){
  e.stopPropagation();
  if(!confirm('Delete this note?'))return;
  notes=notes.filter(n=>n.id!==id);save();
  if(activeId===id){activeId=null;document.getElementById('editor-empty').style.display='flex';document.getElementById('editor-active').style.display='none';}
  render();toast('🗑 Deleted');
}
function togglePin(id,e){
  e.stopPropagation();
  const n=notes.find(x=>x.id===id);if(!n)return;
  n.pinned=!n.pinned;save();render();toast(n.pinned?'📌 Pinned':'Unpinned');
}

function searchNotes(q){render(q)}
function setTab(t,el){tab=t;document.querySelectorAll('.sidebar-tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render()}

function openModal(){
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-title').value='';
  selColor='violet';
  document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('selected'));
  document.querySelector('.cswatch[data-tag="violet"]').classList.add('selected');
  setTimeout(()=>document.getElementById('modal-title').focus(),80);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
function closeModalOut(e){if(e.target===document.getElementById('modal-overlay'))closeModal()}
function pickColor(el){document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('selected'));el.classList.add('selected');selColor=el.dataset.tag}

function autoResizeTitle(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}

function insertWrap(before,after){
  const ta=document.getElementById('editor-textarea');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.slice(s,e)||'text';
  ta.value=ta.value.slice(0,s)+before+sel+after+ta.value.slice(e);
  ta.selectionStart=s+before.length;ta.selectionEnd=s+before.length+sel.length;
  ta.focus();markDirty();
}
function insertLinePrefix(pre){
  const ta=document.getElementById('editor-textarea');
  const s=ta.selectionStart;
  const ls=ta.value.lastIndexOf('\n',s-1)+1;
  ta.value=ta.value.slice(0,ls)+pre+ta.value.slice(ls);
  ta.selectionStart=ta.selectionEnd=s+pre.length;
  ta.focus();markDirty();
}
function insertHR(){
  const ta=document.getElementById('editor-textarea');
  const s=ta.selectionStart,ins='\n\n---\n\n';
  ta.value=ta.value.slice(0,s)+ins+ta.value.slice(s);
  ta.selectionStart=ta.selectionEnd=s+ins.length;
  ta.focus();markDirty();
}
function insertDate(){
  const ta=document.getElementById('editor-textarea');
  const s=ta.selectionStart,d=new Date().toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  ta.value=ta.value.slice(0,s)+d+ta.value.slice(s);
  ta.selectionStart=ta.selectionEnd=s+d.length;
  ta.focus();markDirty();
}
function clearTA(){
  if(!confirm('Clear note content?'))return;
  document.getElementById('editor-textarea').value='';
  markDirty();
}
function updateMeta(){
  const txt=document.getElementById('editor-textarea').value;
  const w=txt.trim()?txt.trim().split(/\s+/).length:0;
  const l=txt.split('\n').length;
  document.getElementById('editor-meta').textContent=`${w} word${w!==1?'s':''} · ${l} line${l!==1?'s':''}`;
}

function exportNotes(){
  const b=new Blob([JSON.stringify(notes,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ink-ether-notes.json';a.click();
  toast('💾 Notes exported');
}
function importNotes(){document.getElementById('import-input').click()}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(!Array.isArray(imp))throw new Error();
      notes=[...imp,...notes];save();render();
      toast(`📂 Imported ${imp.length} note${imp.length!==1?'s':''}`);
    }catch{toast('⚠️ Invalid file format')}
  };
  r.readAsText(file);
  e.target.value='';
}

function setupKeys(){
  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();openModal()}
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveNote()}
    if(e.key==='Escape')closeModal()
  });
}
function updateClock(){
  document.getElementById('status-time').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
function toast(msg,dur=2500){
  const w=document.getElementById('toast-wrap');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  w.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),220)},dur);
}
function uid(){return'n'+Date.now()+Math.random().toString(36).slice(2,6)}
function save(){localStorage.setItem('inkether2',JSON.stringify(notes))}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function relTime(ts){
  const d=Date.now()-ts,s=Math.floor(d/1000),m=Math.floor(s/60),h=Math.floor(m/60),day=Math.floor(h/24);
  if(s<60)return'just now';if(m<60)return m+'m ago';if(h<24)return h+'h ago';
  if(day<7)return day+'d ago';return new Date(ts).toLocaleDateString([],{month:'short',day:'numeric'});
}
</script>
</body>
</html>
